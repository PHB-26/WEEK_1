<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI_BOT | AI Study Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>🤖 AI_BOT</h1>

            <p class="subtitle">
                Intelligent Study Assistant
            </p>

            <p class="description">
                Explain concepts, summarize notes, and generate quiz questions instantly using Generative AI.
            </p>
        </div>

        <div class="form-group">

            <label for="feature">Choose a Feature</label>

            <select id="feature">
                <option value="explain">
                    📘 Explain a Concept
                </option>

                <option value="summarize">
                    📝 Summarize Text
                </option>

                <option value="quiz">
                    ❓ Generate Quiz Questions
                </option>
            </select>

        </div>

        <div class="form-group">

            <label for="inputText">Enter Your Text</label>

            <textarea
                id="inputText"
                placeholder="Paste your notes, topic, or study material here..."
            ></textarea>

        </div>

        <button id="generateBtn">
            ✨ Generate Response
        </button>

        <div id="loading"></div>

        <div class="output-section">

            <div class="output-header">
                <h2>📄 Output</h2>
            </div>

            <pre id="output">
Your AI-generated response will appear here...
            </pre>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
